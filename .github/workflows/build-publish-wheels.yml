name: Build and publish wheels

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types:
      - published
jobs:
  build-unix:
    strategy:
      fail-fast: False
      matrix:
        os: [ubuntu, macos]
        python-version: [3.12, 3.13]

    name: ${{ matrix.os }} with Python ${{ matrix.python-version }} built and tests
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 20

    steps:
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install python dependencies
        run: python -m pip install conan cmake ninja

      - name: Setup directories
        run: |
          mkdir pycanha-project
          cd pycanha-project
          mkdir pycanha-core pycanha-core-python
        shell: bash

      - name: Configure compiler (Linux)
        if: matrix.os == 'ubuntu'
        run: |
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Configure compiler (macOS)
        if: matrix.os == 'macos'
        run: |
          echo "CC=clang" >> "$GITHUB_ENV"
          echo "CXX=clang++" >> "$GITHUB_ENV"

      - name: Check out pycanha-core-python repo
        uses: actions/checkout@v4
        with:
          path: pycanha-project/pycanha-core-python

      - name: Get version from pyproject.toml
        run: |
          import os, tomllib
          from pathlib import Path
          pyproject = tomllib.loads(Path("pycanha-project/pycanha-core-python/pyproject.toml").read_text())
          version = ".".join(pyproject["project"]["version"].split(".")[:2])
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")
        shell: python
        id: metadata

      - name: Check out pycanha-core repo at version
        uses: actions/checkout@v4
        with:
          repository: pycanha-project/pycanha-core
          path: pycanha-project/pycanha-core
          ref: v${{ steps.metadata.outputs.version }}

      - name: Conan prepare
        run: |
          PROFILE="pycanha-project/pycanha-core-python/src/pycanha_core_bindings/pycanha-core-conan-profile"
          CORE="pycanha-project/pycanha-core"
          BINDINGS="pycanha-project/pycanha-core-python/src/pycanha_core_bindings"
          OUTPUT="pycanha-project/pycanha-core-python/build/conan-deps"

          USE_MKL=True
          if [ "${{ matrix.os }}" = "macos" ]; then
            USE_MKL=False
          fi

          conan export "$CORE"
          conan install "$BINDINGS" \
            -pr:h="$PROFILE" -pr:b="$PROFILE" \
            --build=missing \
            -of "$OUTPUT" \
            -o "pycanha-core*:PYCANHA_OPTION_USE_MKL=$USE_MKL"
        shell: bash

      - name: Build and install
        run: |
          cd pycanha-project/pycanha-core-python
          TOOLCHAIN="$(pwd)/build/conan-deps/conan_toolchain.cmake"
          EXTRAS=".[test,build]"
          if [ "${{ matrix.os }}" != "macos" ]; then
            EXTRAS=".[test,build,mkl]"
          fi
          pip install $EXTRAS \
            --config-settings=cmake.define.CMAKE_TOOLCHAIN_FILE="$TOOLCHAIN"
        shell: bash

      - name: Run tests
        run: cd pycanha-project/pycanha-core-python && pytest
        shell: bash

      - name: Build wheels
        run: |
          cd pycanha-project/pycanha-core-python
          TOOLCHAIN="$(pwd)/build/conan-deps/conan_toolchain.cmake"
          python -m build \
            -Ccmake.define.CMAKE_TOOLCHAIN_FILE="$TOOLCHAIN"
        shell: bash

      - name: Repair wheel with auditwheel
        if: matrix.os == 'ubuntu'
        run: |
          cd pycanha-project/pycanha-core-python/dist
          python -m pip install auditwheel
          sudo apt-get update && sudo apt-get install -y patchelf
          for whl in *.whl; do
            auditwheel repair "$whl" --plat manylinux_2_39_x86_64 -w output
          done
          rm *.whl
          mv output/* .
          rm -r output
        shell: bash

      - name: Extract stubs from wheel (Linux only)
        if: matrix.os == 'ubuntu' && matrix.python-version == '3.12'
        run: |
          cd pycanha-project/pycanha-core-python
          mkdir -p stubs
          for whl in dist/*.whl; do
            python -c "
          import zipfile, sys, shutil
          with zipfile.ZipFile(sys.argv[1]) as z:
              for name in z.namelist():
                  if name.startswith('pycanha_core/') and (name.endswith('.pyi') or name.endswith('py.typed')):
                      target = 'stubs/' + name.split('/', 1)[1]
                      with z.open(name) as src, open(target, 'wb') as dst:
                          shutil.copyfileobj(src, dst)
          " "$whl"
            break  # only need one wheel
          done
          echo "Extracted stubs:"
          ls -la stubs/
        shell: bash

      - name: Validate extracted stubs
        if: matrix.os == 'ubuntu' && matrix.python-version == '3.12'
        run: |
          cd pycanha-project/pycanha-core-python/stubs
          for f in __init__.pyi gmm.pyi tmm.pyi parameters.pyi solvers.pyi; do
            test -s "$f" || { echo "Missing or empty: $f"; exit 1; }
          done
          test -f py.typed || { echo "Missing: py.typed"; exit 1; }
          echo "All stubs valid"
        shell: bash

      - name: Upload stubs artifact
        if: matrix.os == 'ubuntu' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: generated-stubs
          path: pycanha-project/pycanha-core-python/stubs/

      - uses: actions/upload-artifact@v4
        with:
          name: pycanha-dist-files-${{ matrix.os }}-${{ matrix.python-version }}
          path: pycanha-project/pycanha-core-python/dist/*.whl

      - name: Upload sdist
        if: matrix.os == 'ubuntu' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: pycanha-dist-files-sdist
          path: pycanha-project/pycanha-core-python/dist/*.tar.gz

  build-windows:
    needs: [build-unix]
    strategy:
      fail-fast: False
      matrix:
        python-version: [3.12, 3.13]

    name: windows with Python ${{ matrix.python-version }} built and tests
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install python dependencies
        run: python -m pip install conan cmake ninja

      - name: Setup directories
        run: |
          mkdir pycanha-project
          cd pycanha-project
          mkdir pycanha-core pycanha-core-python
        shell: bash

      - name: Check out pycanha-core-python repo
        uses: actions/checkout@v4
        with:
          path: pycanha-project/pycanha-core-python

      - name: Get version from pyproject.toml
        run: |
          import os, tomllib
          from pathlib import Path
          pyproject = tomllib.loads(Path("pycanha-project/pycanha-core-python/pyproject.toml").read_text())
          version = ".".join(pyproject["project"]["version"].split(".")[:2])
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")
        shell: python
        id: metadata

      - name: Check out pycanha-core repo at version
        uses: actions/checkout@v4
        with:
          repository: pycanha-project/pycanha-core
          path: pycanha-project/pycanha-core
          ref: v${{ steps.metadata.outputs.version }}

      - name: Download pregenerated stubs
        uses: actions/download-artifact@v4
        with:
          name: generated-stubs
          path: pycanha-project/pycanha-core-python/pregenerated-stubs

      - name: Validate pregenerated stubs
        run: |
          cd pycanha-project/pycanha-core-python/pregenerated-stubs
          for f in __init__.pyi gmm.pyi tmm.pyi parameters.pyi solvers.pyi; do
            test -s "$f" || { echo "Missing or empty: $f"; exit 1; }
          done
          test -f py.typed || { echo "Missing: py.typed"; exit 1; }
          echo "All stubs valid"
        shell: bash

      - name: Conan prepare
        run: |
          PROFILE="pycanha-project/pycanha-core-python/src/pycanha_core_bindings/pycanha-core-conan-profile"
          CORE="pycanha-project/pycanha-core"
          BINDINGS="pycanha-project/pycanha-core-python/src/pycanha_core_bindings"
          OUTPUT="pycanha-project/pycanha-core-python/build/conan-deps"

          conan export "$CORE"
          conan install "$BINDINGS" \
            -pr:h="$PROFILE" -pr:b="$PROFILE" \
            --build=missing \
            -of "$OUTPUT" \
            -o "pycanha-core*:PYCANHA_OPTION_USE_MKL=True"
        shell: bash

      - name: Build and install
        run: |
          cd pycanha-project/pycanha-core-python
          TOOLCHAIN="$(pwd)/build/conan-deps/conan_toolchain.cmake"
          STUBS_DIR="$(pwd)/pregenerated-stubs"
          pip install ".[test,build,mkl]" \
            --config-settings=cmake.define.CMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            --config-settings=cmake.define.PYCANHA_PREGENERATED_STUBS_DIR="$STUBS_DIR"
        shell: bash

      - name: Run tests
        run: cd pycanha-project/pycanha-core-python && pytest
        shell: bash

      - name: Build wheels
        run: |
          cd pycanha-project/pycanha-core-python
          TOOLCHAIN="$(pwd)/build/conan-deps/conan_toolchain.cmake"
          STUBS_DIR="$(pwd)/pregenerated-stubs"
          python -m build \
            -Ccmake.define.CMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -Ccmake.define.PYCANHA_PREGENERATED_STUBS_DIR="$STUBS_DIR"
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: pycanha-dist-files-windows-${{ matrix.python-version }}
          path: pycanha-project/pycanha-core-python/dist/*.whl

  upload_pypi:
    name: Publish to PyPI
    needs: [build-unix, build-windows]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pycanha-core
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pycanha-dist-files*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
