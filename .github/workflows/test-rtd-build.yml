name: Test Read the Docs trigger

on:
  push:
  workflow_dispatch:
    inputs:
      version_slug:
        description: Read the Docs version slug to trigger
        required: false
        type: string

jobs:
  trigger-rtd:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RTD_PROJECT_SLUG: pycanha-core-python
      RTD_API_URL: https://app.readthedocs.org/api/v3
      RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
      VERSION_SLUG: ${{ inputs.version_slug || github.ref_name }}
    steps:
      - name: Check configuration
        run: |
          test -n "$VERSION_SLUG"
          if [ -z "$RTD_TOKEN" ]; then
            echo "RTD_TOKEN secret is not configured."
            exit 1
          fi

      - name: Sync Read the Docs versions
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Token $RTD_TOKEN" \
            "$RTD_API_URL/projects/$RTD_PROJECT_SLUG/sync-versions/"

      - name: Activate version if needed
        run: |
          for attempt in 1 2 3 4 5; do
            status_code=$(curl --silent --output version.json --write-out '%{http_code}' \
              -H "Authorization: Token $RTD_TOKEN" \
              "$RTD_API_URL/projects/$RTD_PROJECT_SLUG/versions/$VERSION_SLUG/")
            if [ "$status_code" = "200" ]; then
              break
            fi
            if [ "$attempt" = "5" ]; then
              cat version.json
              exit 1
            fi
            sleep 5
          done

          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('version.json').read_text(encoding='utf-8'))
          print(f"Resolved RTD version: {payload['slug']} (active={payload['active']}, built={payload['built']})")
          PY

          curl --fail --silent --show-error \
            -X PATCH \
            -H "Authorization: Token $RTD_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"active": true, "hidden": false}' \
            "$RTD_API_URL/projects/$RTD_PROJECT_SLUG/versions/$VERSION_SLUG/"

      - name: Trigger Read the Docs build
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Token $RTD_TOKEN" \
            "$RTD_API_URL/projects/$RTD_PROJECT_SLUG/versions/$VERSION_SLUG/builds/"

      - name: Print dashboard URL
        run: |
          echo "Build requested for https://app.readthedocs.org/projects/$RTD_PROJECT_SLUG/builds/"
          echo "Version URL: https://app.readthedocs.org/projects/$RTD_PROJECT_SLUG/version/$VERSION_SLUG/"